<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LUXE. E-commerce</title>
    <style>
      /* Initial loader styles to improve FCP */
      body, html { margin: 0; padding: 0; background-color: #ffffff; font-family: sans-serif; }
      #initial-loader {
        display: flex;
        flex-direction: column;
        height: 100vh;
        width: 100vw;
      }
      .skeleton-header { height: 64px; background-color: #ffffff; width: 100%; border-bottom: 1px solid #f3f4f6; }
      .skeleton-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(0,0,0,0.05);
        border-radius: 50%;
        border-left-color: #0a0e27;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="initial-loader">
        <div class="skeleton-header"></div>
        <div class="skeleton-content">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
